name: Build Windows

# Личная сборка форка (AGPLv3): собирает Windows-установщик в облаке GitHub.
# Запуск вручную: вкладка Actions -> "Build Windows" -> Run workflow.
# Готовый .exe появится внизу прогона в разделе Artifacts.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROFILE: release
  TARGET: x86_64-pc-windows-msvc

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 #v7.0.1

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 #v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 #v7.0.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 #master
        with:
          # Pinning the action to a SHA drops the toolchain that the @stable
          # ref used to imply, so name it explicitly.
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #v2.9.1
        with:
          workspaces: src-tauri

      - name: Give each build a unique, increasing version
        shell: bash
        run: |
          # Every manual build otherwise ships as 0.28.2, so the NSIS installer
          # sees "same version already installed" and won't overwrite the binary
          # — a reinstall is a silent no-op. Bump the patch to the run number so
          # each build is strictly newer and installs cleanly over the last one.
          ver="0.28.${{ github.run_number }}"
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='$ver';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');console.log('build version:',j.version)"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec next build

      - name: Build sidecar binary
        working-directory: ./src-tauri
        run: cargo build --bin donut-proxy --release --target x86_64-pc-windows-msvc

      - name: Copy sidecar into place
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp src-tauri/target/x86_64-pc-windows-msvc/release/donut-proxy.exe \
             src-tauri/binaries/donut-proxy-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (installer)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: "--target x86_64-pc-windows-msvc --verbose"

      - name: Upload installer artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a #v7.0.1
        with:
          name: donut-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/donutbrowser.exe
          if-no-files-found: error
