name: Build Windows

# Личная сборка форка (AGPLv3): собирает Windows-установщик в облаке GitHub.
# Запуск вручную: вкладка Actions -> "Build Windows" -> Run workflow.
# Готовый .exe появится внизу прогона в разделе Artifacts.

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  PROFILE: release
  TARGET: x86_64-pc-windows-msvc

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v7.0.0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 #v6.0.9
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f #v6.1.0
        with:
          node-version-file: .node-version
          cache: "pnpm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 #master
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 #v2.9.1
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm exec next build

      - name: Build sidecar binary
        working-directory: ./src-tauri
        run: cargo build --bin donut-proxy --release --target x86_64-pc-windows-msvc

      - name: Copy sidecar into place
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          cp src-tauri/target/x86_64-pc-windows-msvc/release/donut-proxy.exe \
             src-tauri/binaries/donut-proxy-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app (installer)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: ./src-tauri
          args: "--target x86_64-pc-windows-msvc --verbose"

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4
        with:
          name: donut-windows-x64
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
            src-tauri/target/x86_64-pc-windows-msvc/release/donutbrowser.exe
          if-no-files-found: error
